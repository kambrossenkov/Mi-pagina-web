<style>
  :root {
    --bg: #fff;
    --fg: #212121;
    --card: #fff;
    --border: #e6e6e6;
    --primary: #e0004e;
    --primary-fg: #fff;
    --secondary: #f5f5f5;
    --muted: #737373;
    --accent: #ffe5ef;
    --peya-green: #27ae74;
    --peya-orange: #ff6b00;
    --peya-yellow: #ffc800;
    --radius: 0.75rem;
    --destructive: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; width: 100%; max-width: 100vw; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--fg); }
  #root { overflow-x: hidden; width: 100%; max-width: 100vw; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; overflow-x: auto; }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  input { font-family: inherit; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
  @media(max-width:640px) { .container { padding: 0 1rem; } }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .transition-transform { transition: transform 0.3s; }
  .hover-scale:hover { transform: scale(1.05); }
  .shadow-hover:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
  /* Search Bar Mobile Expansion */
  .search-wrapper { flex: 1; max-width: 480px; transition: all 0.3s ease; z-index: 100; }
  .search-input { transition: width 0.3s ease; }
  @media(max-width: 768px) {
    .text-loteria { display: none !important; }
    .btn-loteria { padding: 6px !important; }
    .search-wrapper.is-focused {
      position: absolute;
      top: 12px;
      left: 1rem;
      width: calc(100% - 2rem);
      max-width: none;
    }
    .search-dropdown {
      position: fixed !important;
      top: 64px !important;
      left: 50% !important;
      transform: translateX(-50%);
      width: 95vw !important;
      max-width: none !important;
    }
  }
</style>

// ─── Precios < $1500 (generado dinámicamente desde categoryProducts) ──────────
function parsePrecio(str) {
  if (typeof str === 'number') return str;
  return Number(String(str).replace(/[^0-9,]/g, '').replace(',', '.'));
}

const cheapProducts = Object.entries(categoryProducts)
  .flatMap(([cat, prods]) => prods.map(p => ({ ...p, category: cat })))
  .filter(p => parsePrecio(p.price) < 1500)
  .sort((a, b) => parsePrecio(a.price) - parsePrecio(b.price));

// ─── UTILS ───────────────────────────────────────────────────────────────────

function toSlug(name) {
  return name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "-");
}

function fromSlug(slug) {
  if (!slug) return "";
  return slug.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

const { useState, useRef } = React;

// Simple router
function Router({ children }) {
  const [path, setPath] = useState(window.location.hash.replace("#", "") || "/");
  window._navigate = (p) => {
    if (typeof p === 'number') { window.history.back(); return; }
    window.history.pushState(null, '', window.location.pathname + window.location.search);
    window.location.hash = p;
    setPath(p);
  };
  window.addEventListener("hashchange", () => {
    const p = window.location.hash.replace("#", "") || "/";
    setPath(p);
  });
  return React.createElement(RouterContext.Provider, { value: { path, navigate: window._navigate } }, children);
}
const RouterContext = React.createContext({ path: "/", navigate: () => {} });
function useRouter() { return React.useContext(RouterContext); }

function Link({ to, children, style, className }) {
  const { navigate } = useRouter();
  return (
    <a href={"#" + to} onClick={e => { e.preventDefault(); navigate(to); }} style={style} className={className}>
      {children}
    </a>
  );
}

// ─── CART CONTEXT ─────────────────────────────────────────────────────────────

const CartContext = React.createContext(null);

function parsePrice(price) {
  return parseFloat(price.replace(/[^0-9,]/g, "").replace(",", ".")) || 0;
}

function CartProvider({ children }) {
  const [items, setItems] = useState(() => {
    try {
      const saved = localStorage.getItem("kiosco_cart");
      return saved ? JSON.parse(saved) : [];
    } catch {
      return [];
    }
  });

  React.useEffect(() => {
    localStorage.setItem("kiosco_cart", JSON.stringify(items));
  }, [items]);

  const clearCart = () => {
    setItems([]);
    localStorage.removeItem("kiosco_cart");
  };

  const addToCart = (item, quantity) => {
    setItems(prev => {
      const existing = prev.find(i => i.name === item.name);
      if (existing) return prev.map(i => i.name === item.name ? { ...i, quantity: i.quantity + quantity } : i);
      return [...prev, { ...item, quantity }];
    });
  };

  const removeFromCart = (name) => setItems(prev => prev.filter(i => i.name !== name));

  const updateQuantity = (name, quantity) => {
    if (quantity <= 0) { removeFromCart(name); return; }
    setItems(prev => prev.map(i => i.name === name ? { ...i, quantity } : i));
  };

  const totalItems = items.reduce((sum, i) => sum + i.quantity, 0);
  const totalPrice = items.reduce((sum, i) => sum + parsePrice(i.price) * i.quantity, 0);

  return React.createElement(CartContext.Provider, { value: { items, addToCart, removeFromCart, updateQuantity, clearCart, totalItems, totalPrice } }, children);
}

function useCart() {
  const ctx = React.useContext(CartContext);
  if (!ctx) throw new Error("useCart outside CartProvider");
  return ctx;
}

                    <p className="line-clamp-2" style={{ fontSize:11, fontWeight:600 }}>{r.name}</p>
                    <p style={{ fontSize:13, fontWeight:800, marginTop:4 }}>{r.price}</p>
                  </div>
                </div>

            </div>
          </div>

        {/* Add to cart bar */}
        {!product.agotado && (

            <div style={{ maxWidth:520, margin:"0 auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
                <span style={{ fontSize:17, fontWeight:700 }}>Tu producto</span>
                <span style={{ fontSize:17, fontWeight:700 }}>{product.price}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, border:"1px solid var(--border)", borderRadius:99, padding:"8px 12px" }}>

// ─── TRANSFER MODAL ──────────────────────────────────────────────────────────

function TransferModal({ onClose }) {
  const [copiedAlias, setCopiedAlias] = useState(false);
  const [copiedCbu, setCopiedCbu] = useState(false);
  const { items, totalPrice, clearCart } = useCart();
  const { navigate } = useRouter();

  const handleCopy = (text, type) => {
    navigator.clipboard.writeText(text).then(() => {
      if (type === 'alias') {
        setCopiedAlias(true);
        setTimeout(() => setCopiedAlias(false), 2000);
      } else {
        setCopiedCbu(true);
        setTimeout(() => setCopiedCbu(false), 2000);
      }
    });
  };

  const handleTransferDone = () => {
    let msg = "Hola, ya te transferí el dinero. Te adjunto el comprobante. Mi pedido es el siguiente:\n\n";
    items.forEach(item => {
      msg += `- ${item.quantity}x ${item.name} (${item.price})\n`;
    });
    msg += `\nTotal: $ ${totalPrice.toLocaleString("es-AR", { minimumFractionDigits: 0 })}`;
    const url = `https://wa.me/0000000000?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
    clearCart();
    navigate("/");
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:100, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)" }} onClick={onClose} />
      <div style={{ position:"relative", width:"90%", maxWidth:400, background:"var(--bg)", borderRadius:24, padding:24, display:"flex", flexDirection:"column", gap:16, boxShadow:"0 10px 40px rgba(0,0,0,0.2)" }}>
        <button onClick={onClose} style={{ position:"absolute", top:16, right:16, background:"var(--secondary)", border:"none", borderRadius:99, height:32, width:32, cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
        
        <h2 style={{ fontSize:22, fontWeight:800, textAlign:"center", marginTop:8 }}>Datos para transferir</h2>
        <p style={{ fontSize:14, color:"var(--muted)", textAlign:"center", marginBottom:8 }}>Copiá los datos y hacé la transferencia desde tu cuenta bancaria o billetera virtual.</p>

        {/* Alias Block */}
        <div style={{ background:"var(--secondary)", borderRadius:16, padding:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <span style={{ fontSize:12, color:"var(--muted)", textTransform:"uppercase", fontWeight:700 }}>Alias</span>
            <div style={{ fontSize:16, fontWeight:800, color:"var(--fg)", marginTop:2 }}>MI.ALIAS.KIOSCO</div>
          </div>
          <button onClick={() => handleCopy("MI.ALIAS.KIOSCO", "alias")} style={{ background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:600, cursor:"pointer", color:"var(--fg)", minWidth:80 }}>
            {copiedAlias ? "¡Copiado!" : "Copiar"}
          </button>
        </div>

        {/* CBU Block */}
        <div style={{ background:"var(--secondary)", borderRadius:16, padding:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <span style={{ fontSize:12, color:"var(--muted)", textTransform:"uppercase", fontWeight:700 }}>CVU / CBU</span>
            <div style={{ fontSize:16, fontWeight:800, color:"var(--fg)", marginTop:2 }}>0000000000000000000000</div>
          </div>
          <button onClick={() => handleCopy("0000000000000000000000", "cbu")} style={{ background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:600, cursor:"pointer", color:"var(--fg)", minWidth:80 }}>
            {copiedCbu ? "¡Copiado!" : "Copiar"}
          </button>
        </div>

        <button onClick={handleTransferDone} style={{ width:"100%", background:"#25D366", color:"#fff", fontWeight:800, padding:"16px 0", borderRadius:99, border:"none", cursor:"pointer", fontSize:16, marginTop:8 }}>
          Ya transferí - Enviar comprobante
        </button>
      </div>
    </div>
  );
}

// ─── CHECKOUT PAGE ────────────────────────────────────────────────────────────

      msg += `\nTotal: $ ${totalPrice.toLocaleString("es-AR", { minimumFractionDigits: 0 })}`;

        </div>

      <div style={{ flex:1, overflowY:"auto", paddingBottom:120 }}>
        <div className="container" style={{ maxWidth:520, margin:"0 auto", paddingTop:24 }}>
          
          <h1 style={{ fontSize:28, fontWeight:900, marginBottom:8, color:"var(--fg)", lineHeight:1.2 }}>Último paso</h1>

            {/* Transfer Card */}
            <div onClick={() => setPaymentMethod("transfer")} 
                 style={{ scrollSnapAlign:"start", minWidth:260, flexShrink:0, background:"linear-gradient(135deg, #009EE3, #1159BF)", color:"#fff", borderRadius:20, padding:24, cursor:"pointer", position:"relative", transition:"transform 0.2s, box-shadow 0.2s", transform: paymentMethod === "transfer" ? "scale(1)" : "scale(0.95)", opacity: paymentMethod === "transfer" ? 1 : 0.6, boxShadow: paymentMethod === "transfer" ? "0 8px 24px rgba(0,158,227,0.4)" : "none", border: paymentMethod === "transfer" ? "2px solid #fff" : "2px solid transparent" }}>

              </div>
              <div style={{ fontSize:20, fontWeight:800, lineHeight:1.2 }}>Transferencia / Mercado Pago</div>

            {/* Cash Card */}
            <div onClick={() => setPaymentMethod("cash")}

                <span style={{ fontSize:32 }}>💵</span>

              </div>
              <div style={{ fontSize:20, fontWeight:800, lineHeight:1.2 }}>Efectivo</div>
            </div>

          </div>

          <div style={{ marginTop:32, padding:16, background:"var(--secondary)", borderRadius:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
              <span style={{ fontSize:15, color:"var(--muted)", fontWeight:600 }}>Total a pagar</span>
              <span style={{ fontSize:20, fontWeight:900, color:"var(--fg)" }}>$ {totalPrice.toLocaleString("es-AR", { minimumFractionDigits: 0 })}</span>
            </div>
            {paymentMethod === "cash" && (
              <p style={{ fontSize:13, color:"var(--muted)", marginTop:8 }}>Al pagar, te enviaremos a WhatsApp para confirmar los productos y que los preparamos.</p>
            )}
            {paymentMethod === "transfer" && (
              <p style={{ fontSize:13, color:"var(--muted)", marginTop:8 }}>Te mostraremos nuestros datos para que puedas transferir y luego enviar el comprobante.</p>
            )}
          </div>

          <div style={{ marginTop:24, textAlign:"center" }}>
            <button onClick={() => navigate("/carrito")} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--muted)", fontSize:14, fontWeight:600, textDecoration:"underline" }}>
              Volver a carrito de compra
            </button>
          </div>

        </div>
      </div>

      {/* Fixed Bottom Button */}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"var(--bg)", borderTop:"1px solid var(--border)", padding:16, zIndex:30 }}>
        <div style={{ maxWidth:520, margin:"0 auto" }}>
          <button onClick={handlePay} style={{ width:"100%", background:"#d8315b", color:"#fff", fontWeight:900, padding:"18px 0", borderRadius:99, border:"none", cursor:"pointer", fontSize:18, boxShadow:"0 4px 16px rgba(216,49,91,0.4)" }}>

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const { path } = useRouter();

  if (path.startsWith("/producto/")) {
    const rest = path.replace("/producto/", "");
    const [slugPart, queryPart] = rest.split("?");
    const cat = queryPart ? new URLSearchParams(queryPart).get("cat") : "";
    return <ProductDetailPage slug={slugPart} cat={cat} />;
  }
  if (path === "/carrito") return <CartPage />;
  if (path === "/checkout") return <CheckoutPage />;
  if (path.startsWith("/categoria/")) {
    const slug = path.replace("/categoria/", "");
    return <CategoryPage slug={slug} />;
  }
  return <IndexPage />;
}

function Root() {
  return (
    <Router>
      <CartProvider>
        <App />
        <CartFloatingButton />
      </CartProvider>
    </Router>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
