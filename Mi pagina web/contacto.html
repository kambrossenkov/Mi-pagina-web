<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajemos juntos | Perspective</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'serif'],
          },
          colors: {
            background: 'var(--background)',
            card: 'var(--card)',
            text: 'var(--text)',
            muted: {
              DEFAULT: 'var(--muted)',
              foreground: 'var(--muted-fg)'
            },
            accent: '#3b82f6',
            primary: {
              DEFAULT: 'var(--primary)',
              foreground: 'var(--primary-fg)'
            },
            border: 'var(--border)',
            input: 'var(--input)',
            ring: 'var(--ring)'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-card text-text animate-fade-in transition-colors duration-300">
  
  <div class="flex flex-col lg:flex-row min-h-screen">
    
    <!-- Left Side: Video Placeholder -->
    <div class="lg:w-5/12 xl:w-1/2 bg-[#1a1a1a] relative flex items-center justify-center min-h-[40vh] lg:min-h-screen lg:sticky lg:top-0 border-r border-border">
      <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1000&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-30" alt="Video background" />
      
      <!-- Video Play Button Centered -->
      <div class="z-10 bg-white/10 p-6 sm:p-8 rounded-2xl backdrop-blur-md cursor-pointer hover:bg-white/20 transition-all hover:scale-105 border border-white/20 flex flex-col items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        <span class="text-white font-medium text-sm tracking-wider uppercase">Reproducir</span>
      </div>
      
      <!-- Video Label Bottom -->
      <div class="absolute bottom-6 left-6 right-6 text-white/50 text-sm font-medium tracking-wide">
        Espacio para un video
      </div>
    </div>

    <!-- Right Side: Contact Form -->
    <div class="lg:w-7/12 xl:w-1/2 p-6 sm:p-10 md:p-16 xl:p-24 bg-background">
      
      <!-- Top actions (Theme & Language toggle, Home link) -->
      <div class="flex items-center justify-between mb-12 border-b border-border/50 pb-6">
        <a href="index.html" class="flex items-center gap-2 text-muted-foreground hover:text-text font-medium transition-colors text-sm uppercase tracking-wide">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Volver al Inicio
        </a>
        <div class="flex items-center gap-5">
          <button id="lang-toggle" class="text-text hover:text-accent transition-colors text-sm font-bold uppercase w-8">
            ES
          </button>
          <button id="theme-toggle" class="text-text hover:text-accent transition-colors">
            <!-- Sun/Moon icons -->
            <svg id="icon-sun" class="hidden w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            <svg id="icon-moon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
        </div>
      </div>

      <!-- Header -->
      <div class="mb-10">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-text mb-4">Trabajemos juntos</h1>
        <p class="text-xl text-primary font-medium tracking-wide">Empezá la conversación</p>
      </div>

      <!-- Form -->
      <form id="contacto" class="space-y-6" onsubmit="event.preventDefault(); alert('Enviado!');">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label for="nombre" class="block text-sm font-medium text-text">Nombre <span class="text-red-500">*</span></label>
            <input type="text" id="nombre" name="nombre" required class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
          </div>
          <div class="space-y-2">
            <label for="apellido" class="block text-sm font-medium text-text">Apellido <span class="text-red-500">*</span></label>
            <input type="text" id="apellido" name="apellido" required class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label for="email" class="block text-sm font-medium text-text">Email <span class="text-red-500">*</span></label>
            <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
          </div>
          <div class="space-y-2">
            <label for="telefono" class="block text-sm font-medium text-text">Teléfono / WhatsApp (opcional)</label>
            <input type="tel" id="telefono" name="telefono" class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label for="empresa_institucion_proyecto" class="block text-sm font-medium text-text">Empresa / Institución / Proyecto</label>
            <input type="text" id="empresa_institucion_proyecto" name="empresa_institucion_proyecto" class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
          </div>
          <div class="space-y-2">
            <label for="cargo_rol" class="block text-sm font-medium text-text">Cargo / Rol</label>
            <input type="text" id="cargo_rol" name="cargo_rol" class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label for="tipo_contacto" class="block text-sm font-medium text-text">Tipo de contacto</label>
            <div class="relative">
              <select id="tipo_contacto" name="tipo_contacto" class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text appearance-none shadow-sm cursor-pointer pr-10">
                <option value="" disabled selected>Seleccionar...</option>
                <option value="RR.HH. / Recruiter">RR.HH. / Recruiter</option>
                <option value="Profesor / Institución académica">Profesor / Institución académica</option>
                <option value="Emprendedor / Founder">Emprendedor / Founder</option>
                <option value="Empresa / Cliente potencial">Empresa / Cliente potencial</option>
                <option value="Colaborador / Partner">Colaborador / Partner</option>
                <option value="Otro">Otro</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text/60">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
            </div>
          </div>
          <div class="space-y-2">
            <label for="motivo_contacto" class="block text-sm font-medium text-text">¿Por qué querés contactarme? <span class="text-red-500">*</span></label>
            <div class="relative">
              <select id="motivo_contacto" name="motivo_contacto" required class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text appearance-none shadow-sm cursor-pointer pr-10">
                <option value="" disabled selected>Seleccionar...</option>
                <option value="Oportunidad laboral">Oportunidad laboral</option>
                <option value="Ayudantía / docencia">Ayudantía / docencia</option>
                <option value="Proyecto / consultoría">Proyecto / consultoría</option>
                <option value="Colaboración estratégica">Colaboración estratégica</option>
                <option value="Mentoría / intercambio profesional">Mentoría / intercambio profesional</option>
                <option value="Otro">Otro</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text/60">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
            </div>
          </div>
        </div>

        <div class="space-y-2">
          <label for="asunto" class="block text-sm font-medium text-text">Asunto / Tema <span class="text-red-500">*</span></label>
          <input type="text" id="asunto" name="asunto" required class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
        </div>

        <div class="space-y-2">
          <label for="mensaje" class="block text-sm font-medium text-text">Contame brevemente qué necesitás <span class="text-red-500">*</span></label>
          <textarea id="mensaje" name="mensaje" required rows="4" placeholder="Ej.: búsqueda para un rol, propuesta de proyecto, colaboración académica, consultoría o alianza." class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text resize-y shadow-sm"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label for="linkedin_web_empresa" class="block text-sm font-medium text-text">LinkedIn / Web / Empresa</label>
            <input type="text" id="linkedin_web_empresa" name="linkedin_web_empresa" class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
          </div>
          <div class="space-y-2">
            <label for="origen" class="block text-sm font-medium text-text">¿Cómo llegaste a mi página?</label>
            <input type="text" id="origen" name="origen" class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text shadow-sm" />
          </div>
        </div>

        <div class="space-y-2">
          <label for="disponibilidad" class="block text-sm font-medium text-text">Disponibilidad estimada para hablar</label>
          <div class="relative">
            <select id="disponibilidad" name="disponibilidad" class="w-full px-4 py-3 rounded-lg border border-input bg-card focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-text appearance-none shadow-sm cursor-pointer pr-10">
              <option value="" disabled selected>Seleccionar...</option>
              <option value="Esta semana">Esta semana</option>
              <option value="Este mes">Este mes</option>
              <option value="Sin urgencia">Sin urgencia</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text/60">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>

        <div class="space-y-2 pt-2">
          <label class="flex items-start gap-4 cursor-pointer p-4 rounded-xl border border-border/50 bg-card/50 hover:bg-card transition-colors">
            <div class="flex items-center h-6">
              <input type="checkbox" id="consentimiento" name="consentimiento" required class="w-5 h-5 rounded border border-input text-accent focus:ring-accent transition-all bg-background cursor-pointer" />
            </div>
            <span class="text-sm font-medium text-text leading-relaxed mt-0.5">
              Acepto ser contactado en relación con esta consulta <span class="text-red-500">*</span>
            </span>
          </label>
        </div>

        <div class="pt-8 mb-16 lg:mb-0">
          <button type="submit" class="w-full px-8 py-4 rounded-xl bg-primary text-primary-foreground font-bold text-lg hover:opacity-90 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all">
            Enviar consulta
          </button>
        </div>

      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
