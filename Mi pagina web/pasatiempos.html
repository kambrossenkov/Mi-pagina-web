  <style>
  .generating-card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: #080810;
    border-radius: inherit;
    padding: 2rem;
    box-sizing: border-box;
  }

  .generating-loader-text {
    display: flex;
    gap: 2px;
  }

  .generating-loader-letter {
    font-size: 1.4rem;
    font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
    animation: generating-wave 1.4s ease-in-out infinite;
  }

  .generating-loader-letter:nth-child(1)  { animation-delay: 0.0s; }
  .generating-loader-letter:nth-child(2)  { animation-delay: 0.1s; }
  .generating-loader-letter:nth-child(3)  { animation-delay: 0.2s; }
  .generating-loader-letter:nth-child(4)  { animation-delay: 0.3s; }
  .generating-loader-letter:nth-child(5)  { animation-delay: 0.4s; }
  .generating-loader-letter:nth-child(6)  { animation-delay: 0.5s; }
  .generating-loader-letter:nth-child(7)  { animation-delay: 0.6s; }
  .generating-loader-letter:nth-child(8)  { animation-delay: 0.7s; }
  .generating-loader-letter:nth-child(9)  { animation-delay: 0.8s; }
  .generating-loader-letter:nth-child(10) { animation-delay: 0.9s; }

  @keyframes generating-wave {
    0%, 100% {
      transform: translateY(0px);
      color: rgba(255, 255, 255, 0.3);
    }
    50% {
      transform: translateY(-10px);
      color: rgba(255, 255, 255, 1);
    }
  }

  .generating-loader-bar {
    width: 140px;
    height: 3px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }

  .generating-loader-bar::after {
    content: '';
    position: absolute;
    top: 0; left: -40%;
    width: 40%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.8),
      transparent
    );
    border-radius: 99px;
    animation: generating-slide 1.6s ease-in-out infinite;
  }

  @keyframes generating-slide {
    0%   { left: -40%; }
    100% { left: 140%; }
  }

  .generating-subtitle {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.2);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-top: 4px;
  }
  </style>

  <!-- Canvas Beams Physics Engine -->
  <script>
  document.addEventListener('DOMContentLoaded', () => {
      // 1. Text Animation Logic
      const words = ["apasionan", "dan energía"];
      let currentWordIndex = 0;
      const animatedWordElement = document.getElementById('animated-word');
  
      function animateText() {
          // Animate Out
          animatedWordElement.style.transform = 'translateY(-100%)';
          animatedWordElement.style.opacity = '0';
  
          setTimeout(() => {
              // Update Word
              currentWordIndex = (currentWordIndex + 1) % words.length;
              animatedWordElement.textContent = words[currentWordIndex];
              
              // Prepare for Animate In (start from bottom)
              animatedWordElement.style.transition = 'none';
              animatedWordElement.style.transform = 'translateY(100%)';
              
              // Force reflow
              void animatedWordElement.offsetWidth;
              
              // Animate In
              animatedWordElement.style.transition = 'transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.7s ease-in-out';
              animatedWordElement.style.transform = 'translateY(0)';
              animatedWordElement.style.opacity = '1';
          }, 700); // Wait for animate out to finish
      }
  
      // Initial setup
      animatedWordElement.textContent = words[0];
      animatedWordElement.style.transform = 'translateY(0)';
      animatedWordElement.style.opacity = '1';
  
      setInterval(animateText, 3000);
  
      // 2. Canvas Background Logic (Bluish Beams & Noise)
      const canvas = document.getElementById('beams-canvas');
      const noiseCanvas = document.getElementById('noise-canvas');
      if (!canvas || !noiseCanvas) return;
      
      const ctx = canvas.getContext("2d");
      const nCtx = noiseCanvas.getContext("2d");
      
      let beams = [];
      const LAYERS = 3;
      const BEAMS_PER_LAYER = 8;
      let animationFrameId;
  
      function createBeam(width, height, layer) {
          const angle = -35 + Math.random() * 10;
          const baseSpeed = 0.2 + layer * 0.2;
          const baseOpacity = 0.08 + layer * 0.05;
          const baseWidth = 10 + layer * 5;
          return {
              x: Math.random() * width,
              y: Math.random() * height,
              width: baseWidth,
              length: height * 2.5,
              angle,
              speed: baseSpeed + Math.random() * 0.2,
              opacity: baseOpacity + Math.random() * 0.1,
              pulse: Math.random() * Math.PI * 2,
              pulseSpeed: 0.01 + Math.random() * 0.015,
              layer,
          };
      }
  
      function resizeCanvas() {
          const dpr = window.devicePixelRatio || 1;
          
          canvas.width = window.innerWidth * dpr;
          canvas.height = window.innerHeight * dpr;
          canvas.style.width = `${window.innerWidth}px`;
          canvas.style.height = `${window.innerHeight}px`;
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);
          
          noiseCanvas.width = window.innerWidth * dpr;
          noiseCanvas.height = window.innerHeight * dpr;
          noiseCanvas.style.width = `${window.innerWidth}px`;
          noiseCanvas.style.height = `${window.innerHeight}px`;
          nCtx.setTransform(1, 0, 0, 1, 0, 0);
          nCtx.scale(dpr, dpr);
          
          beams = [];
          for (let layer = 1; layer <= LAYERS; layer++) {
              for (let i = 0; i < BEAMS_PER_LAYER; i++) {
                  beams.push(createBeam(window.innerWidth, window.innerHeight, layer));
              }
          }
      }
  
      function generateNoise() {
          const imgData = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
          for (let i = 0; i < imgData.data.length; i += 4) {
              const v = Math.random() * 255;
              imgData.data[i] = v;
              imgData.data[i + 1] = v;
              imgData.data[i + 2] = v;
              imgData.data[i + 3] = 12; // Very subtle alpha
          }
          nCtx.putImageData(imgData, 0, 0);
      }
  
      function drawBeam(beam) {
          ctx.save();
          ctx.translate(beam.x, beam.y);
          ctx.rotate((beam.angle * Math.PI) / 180);
          
          const pulsingOpacity = Math.min(1, beam.opacity * (0.8 + Math.sin(beam.pulse) * 0.4));
          const gradient = ctx.createLinearGradient(0, 0, 0, beam.length);
          
          // Changed to bluish hues matching text-accent (#3b82f6 approx rgb(59, 130, 246))
          gradient.addColorStop(0, `rgba(59, 130, 246, 0)`);
          gradient.addColorStop(0.2, `rgba(59, 130, 246, ${pulsingOpacity * 0.5})`);
          gradient.addColorStop(0.5, `rgba(59, 130, 246, ${pulsingOpacity})`);
          gradient.addColorStop(0.8, `rgba(59, 130, 246, ${pulsingOpacity * 0.5})`);
          gradient.addColorStop(1, `rgba(59, 130, 246, 0)`);
          
          ctx.fillStyle = gradient;
          ctx.filter = `blur(${2 + beam.layer * 2}px)`;
          ctx.fillRect(-beam.width / 2, 0, beam.width, beam.length);
          ctx.restore();
      }
  
      function animate() {
          const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
          gradient.addColorStop(0, "#000000"); // Deep black
          gradient.addColorStop(1, "#0a0f1a"); // Very dark blue/black at bottom
          
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          beams.forEach((beam) => {
              beam.y -= beam.speed * (beam.layer / LAYERS + 0.5);
              beam.pulse += beam.pulseSpeed;
              if (beam.y + beam.length < -50) {
                  beam.y = window.innerHeight + 50;
                  beam.x = Math.random() * window.innerWidth;
              }
              drawBeam(beam);
          });
          
          // Optionally generate noise every frame (can be heavy on performance, uncomment if needed)
          // generateNoise(); 
          
          animationFrameId = requestAnimationFrame(animate);
      }
  
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
      generateNoise(); // Generate noise once to save performance
      animate();
  
      // 3. Image Accordion Logic
      const accordionData = [
          { id: 1, title: 'Calistenia', imageUrl: 'Fotos/foto_portada_calistenia.png' }, // User's custom image
          { id: 2, title: 'Asados', imageUrl: 'Fotos/asado_portada.jpg', link: 'asados.html' },
          { id: 3, title: 'Músicas', imageUrl: 'Fotos/portada_musicas.jpg', link: 'musicas.html' },
          { id: 4, title: 'Próximamente', generating: true },
          { id: 5, title: 'Próximamente', generating: true }
      ];
  
      const accordionContainer = document.getElementById('accordion-container');
      let activeIndex = 4; // Start with the last one open
  
      function renderAccordion() {
          if (!accordionContainer) return;
          accordionContainer.innerHTML = ''; // Clear container
  
          accordionData.forEach((item, index) => {
              const isActive = index === activeIndex;
              
              // Create item container
              const itemDiv = document.createElement('div');
              const cursorClass = item.generating ? 'cursor-default' : 'cursor-pointer';
              itemDiv.className = `relative h-full rounded-2xl overflow-hidden ${cursorClass} transition-all duration-700 ease-in-out shrink-0 border border-white/10 ${isActive ? 'w-[200px] md:w-[300px] lg:w-[350px]' : 'w-[40px] md:w-[50px] lg:w-[60px]'}`;

              if (item.generating) {
                  // Generating animation card
                  const genCard = document.createElement('div');
                  genCard.className = 'generating-card';
                  genCard.innerHTML = `
                    <div class="generating-loader-text">
                      <span class="generating-loader-letter">G</span>
                      <span class="generating-loader-letter">e</span>
                      <span class="generating-loader-letter">n</span>
                      <span class="generating-loader-letter">e</span>
                      <span class="generating-loader-letter">r</span>
                      <span class="generating-loader-letter">a</span>
                      <span class="generating-loader-letter">t</span>
                      <span class="generating-loader-letter">i</span>
                      <span class="generating-loader-letter">n</span>
                      <span class="generating-loader-letter">g</span>
                    </div>
                    <div class="generating-loader-bar"></div>
                    <p class="generating-subtitle">Próximamente</p>
                  `;
                  // Title when inactive (rotated)
                  const titleSpan = document.createElement('span');
                  titleSpan.className = `absolute text-white font-semibold whitespace-nowrap transition-all duration-700 ease-in-out flex items-center justify-center ` +
                      (isActive
                          ? 'bottom-6 left-1/2 -translate-x-1/2 rotate-0 text-xl lg:text-2xl drop-shadow-lg opacity-0'
                          : 'bottom-[10%] left-1/2 -translate-x-1/2 -rotate-90 origin-center text-sm tracking-widest uppercase opacity-70');
                  titleSpan.textContent = item.title;
                  itemDiv.appendChild(genCard);
                  itemDiv.appendChild(titleSpan);
              } else {
                  // Background Image
                  const img = document.createElement('img');
                  img.src = item.imageUrl;
                  img.alt = item.title;
                  img.className = 'absolute inset-0 w-full h-full object-cover';
                  if(item.title === 'Calistenia') {
                     img.classList.remove('object-cover');
                     img.classList.add('object-contain', 'bg-black');
                  }
                  img.onerror = function() { this.src = 'https://placehold.co/400x450/111111/3b82f6?text=Image+Not+Found'; };

                  // Dark Overlay
                  const overlay = document.createElement('div');
                  overlay.className = 'absolute inset-0 bg-black transition-opacity duration-700 ' + (isActive ? 'bg-opacity-20' : 'bg-opacity-60 hover:bg-opacity-40');

                  // Title Span
                  const titleSpan = document.createElement('span');
                  titleSpan.className = `absolute text-white font-semibold whitespace-nowrap transition-all duration-700 ease-in-out flex items-center justify-center ` +
                      (isActive
                          ? 'bottom-6 left-1/2 -translate-x-1/2 rotate-0 text-xl lg:text-2xl drop-shadow-lg'
                          : 'bottom-[10%] left-1/2 -translate-x-1/2 -rotate-90 origin-center text-sm tracking-widest uppercase opacity-70');
                  titleSpan.textContent = item.title;

                  itemDiv.appendChild(img);
                  itemDiv.appendChild(overlay);
                  itemDiv.appendChild(titleSpan);
              }

              // Add Event Listener for Hover
              itemDiv.addEventListener('mouseenter', () => {
                  if (activeIndex !== index) {
                      activeIndex = index;
                      renderAccordion(); // Re-render to trigger transitions
                  }
              });

              // Add click to navigate if item has a link
              if (item.link) {
                  itemDiv.addEventListener('click', () => {
                      window.location.href = item.link;
                  });
              }

              accordionContainer.appendChild(itemDiv);
          });
      }
  
      renderAccordion();
  });
  </script>
