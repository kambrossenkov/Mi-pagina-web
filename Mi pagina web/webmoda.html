<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La moda de las páginas webs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #000005;
    }

    /* ── Fondo espacial ── */
    #bg {
      position: fixed;
      inset: 0;
      background-image: url('https://www.nasa.gov/wp-content/uploads/2023/03/iss070e017948.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    /* ── Contenido principal ── */
    #content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
    }

    /* ── Título ── */
    #title {
      font-size: clamp(1.4rem, 3.5vw, 2.5rem);
      font-weight: 300;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 16px rgba(0,0,0,0.7), 0 1px 4px rgba(0,0,0,0.5);
      user-select: none;
    }

    /* ── Contenedor orbital ── */
    #orbital-container {
      width: 500px;
      height: 500px;
      position: relative;
      margin: 0 auto;
      flex-shrink: 0;
    }

    @media (max-width: 560px) {
      #orbital-container {
        width: 340px;
        height: 340px;
      }
    }

    /* ── Anillo orbital ── */
    /* width/height = RADIUS*2 = 200*2 = 400px — debe coincidir con el JS */
    #orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 400px;
      height: 400px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      pointer-events: none;
    }

    /* ── Núcleo central ── */
    #nucleus {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 90px;
      z-index: 10;
      cursor: default;
    }

    /* ── Nodos ── */
    .node-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      /* transform se aplica por JS; translate(-50%,-50%) base incluido allí */
    }

    .node-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #000000;
      color: #ffffff;
      border: 2px solid rgba(255, 255, 255, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 400;
      transition: background 0.25s ease, color 0.25s ease,
                  border-color 0.25s ease, box-shadow 0.25s ease;
      user-select: none;
      pointer-events: none;
    }

    .node-label {
      font-size: 0.68rem;
      font-weight: 400;
      color: #ffffff;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      user-select: none;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    /* Estado activo del nodo */
    .node-wrapper.active .node-circle {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    /* ── Tarjeta de información ── */
    .info-card {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      width: 256px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
      z-index: 300;
      pointer-events: none;
      animation: cardFadeIn 0.2s ease forwards;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0);    }
    }

    .info-card-title {
      font-size: 0.95rem;
      font-weight: 400;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .info-card-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 400;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: #000000;
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .info-card-desc {
      font-size: 0.78rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .progress-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: linear-gradient(to right, #3b82f6, #a855f7);
    }

    /* ── Botón Volver ── */
    #btn-back {
      position: fixed;
      bottom: 28px;
      left: 28px;
      z-index: 10;
      padding: 10px 22px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      cursor: pointer;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
      text-decoration: none;
      display: inline-block;
    }

    #btn-back:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <!-- Fondo espacial NASA -->
  <div id="bg"></div>

  <!-- Canvas fallback de estrellas -->
  <canvas id="starfield"></canvas>

  <!-- Overlay oscuro -->
  <div id="overlay"></div>

  <!-- Contenido -->
  <main id="content">
    <h1 id="title">La moda de las páginas webs</h1>

    <!-- Orbital -->
    <div id="orbital-container">
      <!-- Anillo -->
      <div id="orbit-ring"></div>

      <!-- Núcleo CPU -->
      <div id="nucleus">
        <svg
          id="cpu-svg"
          width="100%"
          height="100%"
          viewBox="0 0 200 100"
          style="color: rgba(255,255,255,0.3)"
        >
          <!-- PATHS con animación de entrada -->
          <g stroke="currentColor" fill="none" stroke-width="0.3"
             stroke-dasharray="100 100" pathLength="100"
             marker-start="url(#cpu-circle-marker)">
            <path id="path-1" stroke-dasharray="100 100" pathLength="100"
                  d="M 10 20 h 79.5 q 5 0 5 5 v 30">
              <animate attributeName="stroke-dashoffset"
                       from="100" to="0" dur="1s" fill="freeze"
                       calcMode="spline" keySplines="0.25,0.1,0.5,1"
                       keyTimes="0; 1"/>
            </path>
            <path id="path-2" stroke-dasharray="100 100" pathLength="100"
                  d="M 180 10 h -69.7 q -5 0 -5 5 v 30">
              <animate attributeName="stroke-dashoffset"
                       from="100" to="0" dur="1s" fill="freeze"
                       calcMode="spline" keySplines="0.25,0.1,0.5,1"
                       keyTimes="0; 1"/>
            </path>
            <path id="path-3" d="M 130 20 v 21.8 q 0 5 -5 5 h -10"/>
            <path id="path-4" d="M 170 80 v -21.8 q 0 -5 -5 -5 h -50"/>
            <path id="path-5" stroke-dasharray="100 100" pathLength="100"
                  d="M 135 65 h 15 q 5 0 5 5 v 10 q 0 5 -5 5 h -39.8 q -5 0 -5 -5 v -20">
              <animate attributeName="stroke-dashoffset"
                       from="100" to="0" dur="1s" fill="freeze"
                       calcMode="spline" keySplines="0.25,0.1,0.5,1"
                       keyTimes="0; 1"/>
            </path>
            <path id="path-6" d="M 94.8 95 v -36"/>
            <path id="path-7" d="M 88 88 v -15 q 0 -5 -5 -5 h -10 q -5 0 -5 -5 v -5 q 0 -5 5 -5 h 14"/>
            <path id="path-8" d="M 30 30 h 25 q 5 0 5 5 v 6.5 q 0 5 5 5 h 20"/>
          </g>

          <!-- LUCES DE COLORES que viajan por los paths -->
          <!-- 1. Azul -->
          <g mask="url(#cpu-mask-1)">
            <circle r="8" fill="url(#cpu-blue-grad)">
              <animateMotion dur="3s" begin="0s" repeatCount="indefinite" rotate="auto">
                <mpath href="#path-1"/>
              </animateMotion>
            </circle>
          </g>
          <!-- 2. Amarillo -->
          <g mask="url(#cpu-mask-2)">
            <circle r="8" fill="url(#cpu-yellow-grad)">
              <animateMotion dur="2.5s" begin="0.5s" repeatCount="indefinite" rotate="auto">
                <mpath href="#path-2"/>
              </animateMotion>
            </circle>
          </g>
          <!-- 3. Rosa -->
          <g mask="url(#cpu-mask-3)">
            <circle r="8" fill="url(#cpu-pinkish-grad)">
              <animateMotion dur="2s" begin="1s" repeatCount="indefinite" rotate="auto">
                <mpath href="#path-3"/>
              </animateMotion>
            </circle>
          </g>
          <!-- 4. Blanco -->
          <g mask="url(#cpu-mask-4)">
            <circle r="8" fill="url(#cpu-white-grad)">
              <animateMotion dur="3.5s" begin="0.3s" repeatCount="indefinite" rotate="auto">
                <mpath href="#path-4"/>
              </animateMotion>
            </circle>
          </g>
          <!-- 5. Verde -->
          <g mask="url(#cpu-mask-5)">
            <circle r="8" fill="url(#cpu-green-grad)">
              <animateMotion dur="4s" begin="0.8s" repeatCount="indefinite" rotate="auto">
                <mpath href="#path-5"/>
              </animateMotion>
            </circle>
          </g>
          <!-- 6. Naranja -->
          <g mask="url(#cpu-mask-6)">
            <circle r="8" fill="url(#cpu-orange-grad)">
              <animateMotion dur="2.8s" begin="1.2s" repeatCount="indefinite" rotate="auto">
                <mpath href="#path-6"/>
              </animateMotion>
            </circle>
          </g>
          <!-- 7. Cyan -->
          <g mask="url(#cpu-mask-7)">
            <circle r="8" fill="url(#cpu-cyan-grad)">
              <animateMotion dur="3.2s" begin="0.6s" repeatCount="indefinite" rotate="auto">
                <mpath href="#path-7"/>
              </animateMotion>
            </circle>
          </g>
          <!-- 8. Rosa rojizo -->
          <g mask="url(#cpu-mask-8)">
            <circle r="8" fill="url(#cpu-rose-grad)">
              <animateMotion dur="2.2s" begin="0.9s" repeatCount="indefinite" rotate="auto">
                <mpath href="#path-8"/>
              </animateMotion>
            </circle>
          </g>

          <!-- CAJA CPU -->
          <g fill="url(#cpu-connection-gradient)">
            <rect x="93" y="37" width="2.5" height="5" rx="0.7"/>
            <rect x="104" y="37" width="2.5" height="5" rx="0.7"/>
            <rect x="116.3" y="44" width="2.5" height="5" rx="0.7"
                  transform="rotate(90 116.25 45.5)"/>
            <rect x="122.8" y="44" width="2.5" height="5" rx="0.7"
                  transform="rotate(90 116.25 45.5)"/>
            <rect x="104" y="16" width="2.5" height="5" rx="0.7"
                  transform="rotate(180 105.25 39.5)"/>
            <rect x="114.5" y="16" width="2.5" height="5" rx="0.7"
                  transform="rotate(180 105.25 39.5)"/>
            <rect x="80" y="-13.6" width="2.5" height="5" rx="0.7"
                  transform="rotate(270 115.25 19.5)"/>
            <rect x="87" y="-13.6" width="2.5" height="5" rx="0.7"
                  transform="rotate(270 115.25 19.5)"/>
          </g>
          <rect x="85" y="40" width="30" height="20" rx="2"
                fill="#181818" filter="url(#cpu-light-shadow)"/>
          <text x="92" y="52.5" font-size="7" fill="url(#cpu-text-gradient)"
                font-weight="600" letter-spacing="0.05em">CPU</text>

          <!-- DEFS: máscaras, gradientes, filtros, marker -->
          <defs>
            <mask id="cpu-mask-1">
              <path d="M 10 20 h 79.5 q 5 0 5 5 v 24"
                    stroke-width="0.5" stroke="white"/>
            </mask>
            <mask id="cpu-mask-2">
              <path d="M 180 10 h -69.7 q -5 0 -5 5 v 24"
                    stroke-width="0.5" stroke="white"/>
            </mask>
            <mask id="cpu-mask-3">
              <path d="M 130 20 v 21.8 q 0 5 -5 5 h -10"
                    stroke-width="0.5" stroke="white"/>
            </mask>
            <mask id="cpu-mask-4">
              <path d="M 170 80 v -21.8 q 0 -5 -5 -5 h -50"
                    stroke-width="0.5" stroke="white"/>
            </mask>
            <mask id="cpu-mask-5">
              <path d="M 135 65 h 15 q 5 0 5 5 v 10 q 0 5 -5 5 h -39.8 q -5 0 -5 -5 v -20"
                    stroke-width="0.5" stroke="white"/>
            </mask>
            <mask id="cpu-mask-6">
              <path d="M 94.8 95 v -36" stroke-width="0.5" stroke="white"/>
            </mask>
            <mask id="cpu-mask-7">
              <path d="M 88 88 v -15 q 0 -5 -5 -5 h -10 q -5 0 -5 -5 v -5 q 0 -5 5 -5 h 14"
                    stroke-width="0.5" stroke="white"/>
            </mask>
            <mask id="cpu-mask-8">
              <path d="M 30 30 h 25 q 5 0 5 5 v 6.5 q 0 5 5 5 h 20"
                    stroke-width="0.5" stroke="white"/>
            </mask>

            <radialGradient id="cpu-blue-grad" fx="1">
              <stop offset="0%" stop-color="#00E8ED"/>
              <stop offset="50%" stop-color="#0088FF"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="cpu-yellow-grad" fx="1">
              <stop offset="0%" stop-color="#FFD800"/>
              <stop offset="50%" stop-color="#FFD800"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="cpu-pinkish-grad" fx="1">
              <stop offset="0%" stop-color="#830CD1"/>
              <stop offset="50%" stop-color="#FF008B"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="cpu-white-grad" fx="1">
              <stop offset="0%" stop-color="white"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="cpu-green-grad" fx="1">
              <stop offset="0%" stop-color="#22c55e"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="cpu-orange-grad" fx="1">
              <stop offset="0%" stop-color="#f97316"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="cpu-cyan-grad" fx="1">
              <stop offset="0%" stop-color="#06b6d4"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="cpu-rose-grad" fx="1">
              <stop offset="0%" stop-color="#f43f5e"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>

            <filter id="cpu-light-shadow" x="-50%" y="-50%"
                    width="200%" height="200%">
              <feDropShadow dx="1.5" dy="1.5" stdDeviation="1"
                            flood-color="black" flood-opacity="0.1"/>
            </filter>
            <marker id="cpu-circle-marker" viewBox="0 0 10 10"
                    refX="5" refY="5" markerWidth="18" markerHeight="18">
              <circle cx="5" cy="5" r="2" fill="black"
                      stroke="#232323" stroke-width="0.5">
                <animate attributeName="r" values="0; 3; 2" dur="0.5s"/>
              </circle>
            </marker>

            <linearGradient id="cpu-connection-gradient"
                            x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#4F4F4F"/>
              <stop offset="60%" stop-color="#121214"/>
            </linearGradient>

            <linearGradient id="cpu-text-gradient" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#666666">
                <animate attributeName="offset" values="-2; -1; 0"
                         dur="5s" repeatCount="indefinite"
                         calcMode="spline" keyTimes="0; 0.5; 1"
                         keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
              </stop>
              <stop offset="25%" stop-color="white">
                <animate attributeName="offset" values="-1; 0; 1"
                         dur="5s" repeatCount="indefinite"
                         calcMode="spline" keyTimes="0; 0.5; 1"
                         keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
              </stop>
              <stop offset="50%" stop-color="#666666">
                <animate attributeName="offset" values="0; 1; 2"
                         dur="5s" repeatCount="indefinite"
                         calcMode="spline" keyTimes="0; 0.5; 1"
                         keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
              </stop>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <!-- Los nodos se generan por JS -->
    </div>
  </main>

  <!-- Botón volver -->
  <a id="btn-back" href="inventos.html">← Inventos</a>

  <script>
    // ─── Fallback fondo espacial ────────────────────────────────────────────
    const bgEl     = document.getElementById('bg');
    const sfCanvas = document.getElementById('starfield');

    function activateStarfield() {
      bgEl.style.backgroundImage = 'none';
      bgEl.style.background = 'radial-gradient(ellipse at bottom, #1a0a00 0%, #0a0a1a 40%, #000005 100%)';
      sfCanvas.style.display = 'block';
      drawStars();
    }

    const testImg = new Image();
    testImg.onload  = () => {};
    testImg.onerror = activateStarfield;
    testImg.src = 'https://www.nasa.gov/wp-content/uploads/2023/03/iss070e017948.jpg';

    function drawStars() {
      const ctx = sfCanvas.getContext('2d');
      let W, H;
      const STARS = Array.from({ length: 320 }, () => ({
        x: Math.random(), y: Math.random(),
        r: Math.random() * 1.4 + 0.3,
        a: Math.random() * 0.6 + 0.3,
        speed: Math.random() * 0.0003 + 0.0001,
        phase: Math.random() * Math.PI * 2,
      }));
      let t = 0;
      function render() {
        ctx.clearRect(0, 0, W, H);
        t += 0.016;
        for (const s of STARS) {
          const alpha = s.a * (0.7 + 0.3 * Math.sin(t * s.speed * 60 + s.phase));
          ctx.beginPath();
          ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
          ctx.fill();
        }
        requestAnimationFrame(render);
      }
      function resize() {
        W = sfCanvas.width  = window.innerWidth;
        H = sfCanvas.height = window.innerHeight;
        render();
      }
      window.addEventListener('resize', resize);
      resize();
    }

    // ─── Orbital ────────────────────────────────────────────────────────────
    const TOTAL         = 8;
    const RADIUS        = 200;   // px — debe coincidir con orbit-ring width/2 (400/2)
    const DEG_PER_FRAME = 0.3;   // velocidad de rotación

    let rotationAngle = 0;
    let autoRotate    = true;
    let activeIndex   = null;

    const container = document.getElementById('orbital-container');

    // Crear los 8 nodos
    const nodeWrappers = [];
    for (let i = 0; i < TOTAL; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'node-wrapper';
      wrapper.dataset.index = i;

      const circle = document.createElement('div');
      circle.className = 'node-circle';
      circle.textContent = i + 1;

      const label = document.createElement('span');
      label.className = 'node-label';
      label.textContent = `Sitio ${i + 1}`;

      wrapper.appendChild(circle);
      wrapper.appendChild(label);
      container.appendChild(wrapper);
      nodeWrappers.push(wrapper);

      wrapper.addEventListener('click', (e) => {
        e.stopPropagation();
        if (activeIndex === i) {
          deselect();
        } else {
          selectNode(i);
        }
      });
    }

    // ── Actualizar posiciones cada frame ──────────────────────────────────
    // Los nodos tienen top:50% left:50% en CSS.
    // El transform solo mueve X e Y desde ese centro + escala.
    function updateNodes() {
      nodeWrappers.forEach((wrapper, index) => {
        const angle  = ((index / TOTAL) * 360 + rotationAngle) % 360;
        const radian = (angle * Math.PI) / 180;

        const x = RADIUS * Math.cos(radian);
        const y = RADIUS * Math.sin(radian);

        // Efecto pseudo-3D: sin(radian) ∈ [-1,1]
        // nodos "abajo" (sin positivo) → frente → más grandes y opacos
        const depth   = (1 + Math.sin(radian)) / 2;
        const opacity = Math.max(0.4, 0.4 + 0.6 * depth);
        const scale   = Math.max(0.75, 0.75 + 0.25 * depth);
        const zIndex  = Math.round(100 + 50 * Math.sin(radian));

        const isActive  = activeIndex === index;
        const nodeScale = isActive ? 1.5 : scale;

        wrapper.style.position  = 'absolute';
        wrapper.style.top       = '50%';
        wrapper.style.left      = '50%';
        wrapper.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${nodeScale})`;
        wrapper.style.opacity   = isActive ? 1 : opacity;
        wrapper.style.zIndex    = isActive ? 200 : zIndex;

        const labelEl = wrapper.querySelector('.node-label');
        labelEl.style.opacity = isActive ? 0 : Math.min(1, opacity * 1.3);
      });
    }

    // ── Loop de animación ─────────────────────────────────────────────────
    function animate() {
      if (autoRotate) {
        rotationAngle = (rotationAngle + DEG_PER_FRAME) % 360;
      }
      updateNodes();
      rafId = requestAnimationFrame(animate);
    }

    // ── Seleccionar nodo ──────────────────────────────────────────────────
    function selectNode(index) {
      autoRotate = false;
      activeIndex = index;

      // Quitar active de todos
      nodeWrappers.forEach(w => {
        w.classList.remove('active');
        removeCard(w);
      });

      // Activar el seleccionado
      const wrapper = nodeWrappers[index];
      wrapper.classList.add('active');

      // Crear tarjeta
      const card = document.createElement('div');
      card.className = 'info-card';
      card.innerHTML = `
        <div class="info-card-title">Sitio ${index + 1}</div>
        <div class="info-card-badge">PRÓXIMAMENTE</div>
        <div class="info-card-desc">Este acceso directo estará disponible pronto.</div>
        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>
      `;
      wrapper.appendChild(card);

      updateNodes();
    }

    // ── Deseleccionar ─────────────────────────────────────────────────────
    function deselect() {
      activeIndex = null;
      autoRotate  = true;
      nodeWrappers.forEach(w => {
        w.classList.remove('active');
        removeCard(w);
      });
    }

    function removeCard(wrapper) {
      const existing = wrapper.querySelector('.info-card');
      if (existing) existing.remove();
    }

    // ── Clic en el fondo → deseleccionar ─────────────────────────────────
    document.addEventListener('click', (e) => {
      if (activeIndex !== null) {
        const clickedNode = e.target.closest('.node-wrapper');
        if (!clickedNode) {
          deselect();
        }
      }
    });

    // ── Arrancar ──────────────────────────────────────────────────────────
    animate();
  </script>
</body>
</html>
