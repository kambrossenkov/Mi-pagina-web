<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La moda de las páginas webs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #000005;
    }

    /* ── Fondo espacial ── */
    #bg {
      position: fixed;
      inset: 0;
      background-image: url('https://www.nasa.gov/wp-content/uploads/2023/03/iss070e017948.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Fallback canvas de estrellas (oculto por defecto, visible si la imagen falla) */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: none;
    }

    /* Overlay semitransparente */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    /* ── Contenido principal ── */
    #content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 24px;
    }

    /* ── Título ── */
    #title {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      font-weight: 300;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.7), 0 1px 4px rgba(0, 0, 0, 0.5);
      user-select: none;
    }

    /* ── Grilla de accesos directos ── */
    #shortcuts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px 28px;
    }

    @media (max-width: 500px) {
      #shortcuts {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px 24px;
      }
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .shortcut-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      font-size: 1.6rem;
      font-weight: 300;
      color: #ffffff;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
    }

    .shortcut:hover .shortcut-circle {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.28);
      transform: scale(1.08);
    }

    .shortcut-label {
      font-size: 0.75rem;
      font-weight: 400;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.8);
      letter-spacing: 0.02em;
      user-select: none;
    }

    /* ── Botón Volver ── */
    #btn-back {
      position: fixed;
      bottom: 28px;
      left: 28px;
      z-index: 3;
      padding: 10px 22px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      cursor: pointer;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
      text-decoration: none;
      display: inline-block;
    }

    #btn-back:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <!-- Fondo espacial NASA -->
  <div id="bg"></div>

  <!-- Canvas fallback de estrellas -->
  <canvas id="starfield"></canvas>

  <!-- Overlay oscuro -->
  <div id="overlay"></div>

  <!-- Contenido -->
  <main id="content">
    <h1 id="title">La moda de las páginas webs</h1>

    <div id="shortcuts">
      <a href="#" class="shortcut">
        <div class="shortcut-circle">1</div>
        <span class="shortcut-label">Sitio 1</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut-circle">2</div>
        <span class="shortcut-label">Sitio 2</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut-circle">3</div>
        <span class="shortcut-label">Sitio 3</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut-circle">4</div>
        <span class="shortcut-label">Sitio 4</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut-circle">5</div>
        <span class="shortcut-label">Sitio 5</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut-circle">6</div>
        <span class="shortcut-label">Sitio 6</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut-circle">7</div>
        <span class="shortcut-label">Sitio 7</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut-circle">8</div>
        <span class="shortcut-label">Sitio 8</span>
      </a>
    </div>
  </main>

  <!-- Botón volver -->
  <a id="btn-back" href="inventos.html">← Inventos</a>

  <script>
    // ── Fallback: si la imagen NASA no carga, mostrar canvas de estrellas ──
    const bgEl = document.getElementById('bg');
    const canvas = document.getElementById('starfield');

    function activateStarfield() {
      bgEl.style.backgroundImage = 'none';
      bgEl.style.background = 'radial-gradient(ellipse at bottom, #1a0a00 0%, #0a0a1a 40%, #000005 100%)';
      canvas.style.display = 'block';
      drawStars();
    }

    // Detectar si la imagen cargó
    const testImg = new Image();
    testImg.onload = () => { /* imagen ok, nada que hacer */ };
    testImg.onerror = activateStarfield;
    testImg.src = 'https://www.nasa.gov/wp-content/uploads/2023/03/iss070e017948.jpg';

    function drawStars() {
      const ctx = canvas.getContext('2d');
      let W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        render();
      }

      const STARS = Array.from({ length: 320 }, () => ({
        x: Math.random(),
        y: Math.random(),
        r: Math.random() * 1.4 + 0.3,
        a: Math.random() * 0.6 + 0.3,
        speed: Math.random() * 0.0003 + 0.0001,
        phase: Math.random() * Math.PI * 2,
      }));

      let t = 0;
      function render() {
        ctx.clearRect(0, 0, W, H);
        t += 0.016;
        for (const s of STARS) {
          const alpha = s.a * (0.7 + 0.3 * Math.sin(t * s.speed * 60 + s.phase));
          ctx.beginPath();
          ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
          ctx.fill();
        }
        requestAnimationFrame(render);
      }

      window.addEventListener('resize', resize);
      resize();
    }
  </script>
</body>
</html>
