  <!-- WebGL Spooky Smoke Effect -->
  <script>
    const canvas = document.getElementById('smoke-bg');
    const gl = canvas.getContext('webgl2');

    if (!gl) {
        console.error('WebGL2 not supported');
    }

    const vertexSrc = `#version 300 es
    in vec2 a_position;
    out vec2 v_uv;
    void main() {
        v_uv = a_position * 0.5 + 0.5;
        gl_Position = vec4(a_position, 0.0, 1.0);
    }`;

    // Translating React logic constraints implicitly to a clean FBM visualizer
    const fragmentShaderSource = `#version 300 es
    precision highp float;
    
    uniform vec2 resolution;
    uniform float time;
    uniform vec3 u_color;
    
    out vec4 fragColor;
    
    // Hash function for pseudo-random noise
    float hash(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
    }
    
    // Value noise
    float noise(vec2 x) {
        vec2 p = floor(x);
        vec2 f = fract(x);
        f = f * f * (3.0 - 2.0 * f);
        return mix(
            mix(hash(p + vec2(0.0, 0.0)), hash(p + vec2(1.0, 0.0)), f.x),
            mix(hash(p + vec2(0.0, 1.0)), hash(p + vec2(1.0, 1.0)), f.x),
            f.y
        );
    }
    
    // Fractal Brownian Motion for Smoke Base
    float fbm(vec2 p) {
        float f = 0.0;
        float amp = 0.5;
        for(int i = 0; i < 6; i++) {
            f += amp * noise(p);
            p *= 2.0;
            p -= time * 0.2; // Move smoke upwards slowly
            amp *= 0.5;
        }
        return f;
    }
    
    void main() {
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        uv.x *= resolution.x / resolution.y; // Fix aspect ratio
        
        // Distortion layering for ethereal smoke effect
        vec2 q = vec2(fbm(uv + time * 0.1), fbm(uv + vec2(1.0)));
        vec2 r = vec2(fbm(uv + 1.0 * q + vec2(1.7, 9.2) + 0.15 * time),
                      fbm(uv + 1.0 * q + vec2(8.3, 2.8) + 0.126 * time));
                      
        float n = fbm(uv + r);
        
        // Deep cosmic blending
        vec3 color = mix(vec3(0.0), u_color, n * n * 2.0);
        
        // Illuminate core ribbon center
        color += u_color * (n * n * n * n) * 1.5;
        
        fragColor = vec4(color, 1.0);
    }`;

    // Boilerplate WebGL wrapper logic
    function compileShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('An error occurred compiling the shaders: ' + gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
        }
        return shader;
    }

    const vertexShader = compileShader(gl, gl.VERTEX_SHADER, vertexSrc);
    const fragmentShader = compileShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);

    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Unable to initialize the shader program: ' + gl.getProgramInfoLog(program));
    }
    gl.useProgram(program);

    // EXACT BUFFER SEQUENCE REQUESTED
    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    const vertices = new Float32Array([
        -1,  1, 
        -1, -1, 
         1,  1, 
         1, -1
    ]);
    gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

    const positionAttributeLocation = gl.getAttribLocation(program, "a_position");
    gl.enableVertexAttribArray(positionAttributeLocation);
    gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);

    const resolutionLocation = gl.getUniformLocation(program, "resolution");
    const timeLocation = gl.getUniformLocation(program, "time");
    const colorLocation = gl.getUniformLocation(program, "u_color");

    // SOFT BLUE COLOR DEFINITION
    gl.uniform3fv(colorLocation, [0.3, 0.6, 0.9]);

    function resizeCanvas() {
        const displayWidth  = Math.floor(window.innerWidth * window.devicePixelRatio);
        const displayHeight = Math.floor(window.innerHeight * window.devicePixelRatio);

        if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
            canvas.width = displayWidth;
            canvas.height = displayHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
        }
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function render(timeMs) {
        const time = timeMs * 0.001;
        
        resizeCanvas();
        gl.clearColor(0.0, 0.0, 0.0, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT);

        gl.uniform1f(timeLocation, time);

        // Uses TRIANGLE_STRIP for 4 points
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        
        requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
