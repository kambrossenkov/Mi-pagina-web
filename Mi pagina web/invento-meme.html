    /* Panorama Slider Styling */
    .panorama-stage {
      perspective: 1200px;
      width: 100%;
      height: 60vh;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .panorama-track {
      width: 250px;
      height: 350px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: grab;
    }
    .panorama-track:active {
      cursor: grabbing;
      transition: none; /* Instant follow when dragging */
    }

    @media (min-width: 768px) {
      .panorama-track {
        width: 320px;
        height: 450px;
      }
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      user-select: none;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 24px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 20;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-50%) scale(1.1);
    }

    .nav-btn.prev {
      left: 5%;
    }

    .nav-btn.next {
      right: 5%;
    }

    .pagination {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;

    .dot.active {

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const track = document.getElementById('track');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pagination = document.getElementById('pagination');
        
        // Configuration: 8 Placeholder slides as requested
        const slides = [1, 2, 3, 4, 5, 6, 7, 8];
        const numSlides = slides.length;
        const angleIncrement = 360 / numSlides;
        
        let radius = 0;
        
        // BUILD DOM
        const slideEls = slides.map((item, i) => {
            const div = document.createElement('div');
            div.className = 'slide flex items-center justify-center text-5xl md:text-7xl font-bold text-white border border-white/20 bg-black/50 backdrop-blur-md transition-all duration-300';
            div.textContent = item; // Show the numbers
            
            // Pagination mapping
            const dot = document.createElement('div');
            dot.className = 'dot';
            if(i === 0) dot.classList.add('active');
            dot.addEventListener('click', () => goToSlide(i));
            pagination.appendChild(dot);
            
            track.appendChild(div);
            return { el: div, dot: dot };
        });

        function init3D() {
            const slideWidth = slideEls[0].el.offsetWidth;
            // Radius math formula: Width / (2 * tan(PI / N)) 
            radius = Math.round((slideWidth / 2) / Math.tan(Math.PI / numSlides)) + 40;
            
            slideEls.forEach((slide, i) => {
                const angle = i * angleIncrement;
                slide.el.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
            });
            updateCarousel();
        }

        let currentIndex = 0;
        let currentRotation = 0;
        
        function updateCarousel() {
            currentRotation = currentIndex * -angleIncrement;
            track.style.transform = `rotateY(${currentRotation}deg)`;
            
            slideEls.forEach((s, idx) => {
                if (idx === getNormalizedIndex(currentIndex)) {
                    s.dot.classList.add('active');
                } else {
                    s.dot.classList.remove('active');
                }
            });
        }

        function getNormalizedIndex(index) {
            return ((index % numSlides) + numSlides) % numSlides;
        }

        function goToSlide(index) {
            let targetIndex = index;
            const currentNorm = getNormalizedIndex(currentIndex);
            const diff = targetIndex - currentNorm;
            
            if (diff > numSlides / 2) {
                targetIndex -= numSlides;
            } else if (diff < -numSlides / 2) {
                targetIndex += numSlides;
            }
            
            currentIndex += targetIndex - currentNorm;
            updateCarousel();
            resetAutoPlay();
        }

        // Action Buttons
        prevBtn.addEventListener('click', () => {
            currentIndex--;
            updateCarousel();
            resetAutoPlay();
        });

        nextBtn.addEventListener('click', () => {
            currentIndex++;
            updateCarousel();
            resetAutoPlay();
        });

        // 3D Drag Interface
        let startX = 0;
        let isDragging = false;
        let startRotation = 0;

        track.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX;
            track.style.transition = 'none';
            startRotation = currentRotation;
            pauseAutoPlay();
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const rotationDiff = (dx / window.innerWidth) * 180; 
            track.style.transform = `rotateY(${startRotation + rotationDiff}deg)`;
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            track.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
            
            const dx = e.clientX - startX;
            if (Math.abs(dx) > 50) {
                if (dx > 0) currentIndex--;
                else currentIndex++;
            }
            updateCarousel();
            resumeAutoPlay();
        });

        // Auto-Play Logic
        let autoPlayTimer;
        function startAutoPlay() {
            autoPlayTimer = setInterval(() => {
                currentIndex++;
                updateCarousel();
            }, 3000);
        }
        function pauseAutoPlay() {
            clearInterval(autoPlayTimer);
        }
        function resumeAutoPlay() {
            pauseAutoPlay();
            startAutoPlay();
        }
        function resetAutoPlay() {
            resumeAutoPlay();
        }

        // Start Up
        window.addEventListener('resize', () => {
            setTimeout(init3D, 100);
        });
        
        setTimeout(() => {
            init3D();
            startAutoPlay();
        }, 100);
    });
  </script>

  <!-- WebGL Spooky Smoke Effect -->
  <script>
    const canvas = document.getElementById('smoke-bg');
    const gl = canvas.getContext('webgl2');

    if (!gl) {
        console.error('WebGL2 not supported');
    }

    const vertexSrc = `#version 300 es
    in vec2 a_position;
    out vec2 v_uv;
    void main() {
        v_uv = a_position * 0.5 + 0.5;
        gl_Position = vec4(a_position, 0.0, 1.0);
    }`;

    // Translating React logic constraints implicitly to a clean FBM visualizer
    const fragmentShaderSource = `#version 300 es
    precision highp float;
    
    uniform vec2 resolution;
    uniform float time;
    uniform vec3 u_color;
    
    out vec4 fragColor;
    
    // Hash function for pseudo-random noise
    float hash(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
    }
    
    // Value noise
    float noise(vec2 x) {
        vec2 p = floor(x);
        vec2 f = fract(x);
        f = f * f * (3.0 - 2.0 * f);
        return mix(
            mix(hash(p + vec2(0.0, 0.0)), hash(p + vec2(1.0, 0.0)), f.x),
            mix(hash(p + vec2(0.0, 1.0)), hash(p + vec2(1.0, 1.0)), f.x),
            f.y
        );
    }
    
    // Fractal Brownian Motion for Smoke Base
    float fbm(vec2 p) {
        float f = 0.0;
        float amp = 0.5;
        for(int i = 0; i < 6; i++) {
            f += amp * noise(p);
            p *= 2.0;
            p -= time * 0.2; // Move smoke upwards slowly
            amp *= 0.5;
        }
        return f;
    }
    
    void main() {
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        uv.x *= resolution.x / resolution.y; // Fix aspect ratio
        
        // Distortion layering for ethereal smoke effect
        vec2 q = vec2(fbm(uv + time * 0.1), fbm(uv + vec2(1.0)));
        vec2 r = vec2(fbm(uv + 1.0 * q + vec2(1.7, 9.2) + 0.15 * time),
                      fbm(uv + 1.0 * q + vec2(8.3, 2.8) + 0.126 * time));
                      
        float n = fbm(uv + r);
        
        // Deep cosmic blending
        vec3 color = mix(vec3(0.0), u_color, n * n * 2.0);
        
        // Illuminate core ribbon center
        color += u_color * (n * n * n * n) * 1.5;
        
        fragColor = vec4(color, 1.0);
    }`;

    // Boilerplate WebGL wrapper logic
    function compileShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('An error occurred compiling the shaders: ' + gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
        }
        return shader;
    }

    const vertexShader = compileShader(gl, gl.VERTEX_SHADER, vertexSrc);
    const fragmentShader = compileShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);

    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Unable to initialize the shader program: ' + gl.getProgramInfoLog(program));
    }
    gl.useProgram(program);

    // EXACT BUFFER SEQUENCE REQUESTED
    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    const vertices = new Float32Array([
        -1,  1, 
        -1, -1, 
         1,  1, 
         1, -1
    ]);
    gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

    const positionAttributeLocation = gl.getAttribLocation(program, "a_position");
    gl.enableVertexAttribArray(positionAttributeLocation);
    gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);

    const resolutionLocation = gl.getUniformLocation(program, "resolution");
    const timeLocation = gl.getUniformLocation(program, "time");
    const colorLocation = gl.getUniformLocation(program, "u_color");

    // SOFT BLUE COLOR DEFINITION
    gl.uniform3fv(colorLocation, [0.3, 0.6, 0.9]);

    function resizeCanvas() {
        const displayWidth  = Math.floor(window.innerWidth * window.devicePixelRatio);
        const displayHeight = Math.floor(window.innerHeight * window.devicePixelRatio);

        if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
            canvas.width = displayWidth;
            canvas.height = displayHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
        }
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function render(timeMs) {
        const time = timeMs * 0.001;
        
        resizeCanvas();
        gl.clearColor(0.0, 0.0, 0.0, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT);

        gl.uniform1f(timeLocation, time);

        // Uses TRIANGLE_STRIP for 4 points
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        
        requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
