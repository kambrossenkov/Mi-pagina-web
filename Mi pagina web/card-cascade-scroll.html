  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    /* Header Deep Cyan Grid */
    .deep-cyan-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.15;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.5) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }
    
    /* Footer Dark Grid */
    .dark-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.2;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    /* ── Loading overlay ── */
    #sva-loader {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 24px;
      transition: opacity 0.6s ease;
    }
    #sva-loader.sva-hidden {
      opacity: 0;
      pointer-events: none;
    }
    #sva-pct {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .sva-loader-label {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .sva-progress-track {
      width: 220px;
      height: 2px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    .sva-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #555, #fff);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* ── Scroll stage ── */
    #sva-stage {
      position: relative;
      height: 500vh;
    }
    #sva-sticky-wrap {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0a0a0a;
    }
    #sva-canvas {
      display: block;
      max-width: 100%;
      max-height: 100vh;
      width: auto;
      height: auto;
    }

    /* ── Scroll hint ── */
    #sva-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 1;
      transition: opacity 0.4s;
      pointer-events: none;
      z-index: 100;
    }
    #sva-hint.sva-gone {
      opacity: 0;
    }
    #sva-hint span {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .sva-chevron {
      width: 20px;
      height: 20px;
      border-right: 2px solid #555;
      border-bottom: 2px solid #555;
      transform: rotate(45deg);
      animation: sva-bounce 1.4s ease infinite;
    }
    @keyframes sva-bounce {
      0%, 100% { transform: rotate(45deg) translateY(0);   opacity: 0.4; }
      50%       { transform: rotate(45deg) translateY(4px); opacity: 1;   }
    }
  </style>
</head>

  <!-- ================= SCROLL ANIMATION JS ================= -->
  <script>
  (function () {
    'use strict';

    var CONFIG = {
      FRAMES_PATH  : 'frames_de_cartas/',
      TOTAL_FRAMES : 192,
      FRAME_WIDTH  : 1280,
      FRAME_HEIGHT : 720,
    };

    function framePath(i) {
      return CONFIG.FRAMES_PATH + 'frame_' + String(i).padStart(4, '0') + '.webp';
    }

    var canvas  = document.getElementById('sva-canvas');
    var ctx     = canvas.getContext('2d');
    var loader  = document.getElementById('sva-loader');
    var bar     = document.getElementById('sva-bar');
    var pct     = document.getElementById('sva-pct');
    var stage   = document.getElementById('sva-stage');
    var hint    = document.getElementById('sva-hint');

    var frames       = new Array(CONFIG.TOTAL_FRAMES);
    var loadedCount  = 0;
    var currentFrame = 0;
    var rafPending   = false;

    function preload() {
      return new Promise(function (resolve) {
        for (var i = 0; i < CONFIG.TOTAL_FRAMES; i++) {
          (function (index) {
            var img = new Image();
            img.onload = img.onerror = function () {
              loadedCount++;
              var p = (loadedCount / CONFIG.TOTAL_FRAMES) * 100;
              bar.style.width      = p + '%';
              pct.textContent      = Math.floor(p) + '%';
              if (loadedCount === CONFIG.TOTAL_FRAMES) resolve();
            };
            img.src    = framePath(index + 1);
            frames[index] = img;
          })(i);
        }
      });
    }

    function drawFrame(index) {
      var img = frames[index];
      if (!img || !img.complete) return;
      ctx.clearRect(0, 0, CONFIG.FRAME_WIDTH, CONFIG.FRAME_HEIGHT);
      ctx.drawImage(img, 0, 0, CONFIG.FRAME_WIDTH, CONFIG.FRAME_HEIGHT);
    }

    function onScroll() {
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(function () {
        rafPending = false;

        var stageTop    = stage.getBoundingClientRect().top + window.scrollY;
        var stageHeight = stage.offsetHeight - window.innerHeight;
        var scrolled    = Math.max(0, window.scrollY - stageTop);
        var progress    = Math.min(1, scrolled / stageHeight);

        var frameIndex  = Math.min(
          CONFIG.TOTAL_FRAMES - 1,
          Math.round(progress * (CONFIG.TOTAL_FRAMES - 1))
        );

        if (frameIndex !== currentFrame) {
          currentFrame = frameIndex;
          drawFrame(currentFrame);
        }

        if (window.scrollY > 40) hint.classList.add('sva-gone');
        else                      hint.classList.remove('sva-gone');
      });
    }

    preload().then(function () {
      loader.classList.add('sva-hidden');
      setTimeout(function () { loader.style.display = 'none'; }, 700);

      drawFrame(0);

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', function () { drawFrame(currentFrame); });
    });

  })();
  </script>
  <!-- ================= FIN SCROLL ANIMATION JS ================= -->

</body>
