<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Gravitational Card-Cascade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    body {
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    /* Header Deep Cyan Grid */
    .deep-cyan-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.15;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.5) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }
    
    /* Footer Dark Grid */
    .dark-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.2;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    /* Fixed Pulsing Star Logo */
    .fixed-star {
      position: fixed;
      top: 100px; /* Spaced to avoid header collision */
      left: 30px;
      z-index: 40;
      width: 45px;
      height: 45px;
      animation: pulseStar 4s ease-in-out infinite;
    }
    @keyframes pulseStar {
      0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5)); }
      50% { transform: scale(1.15) rotate(15deg); opacity: 1; filter: drop-shadow(0 0 25px rgba(139, 92, 246, 0.8)); }
    }

    .scroll-track {
      height: 400vh;
      position: relative;
    }
    
    .sticky-container {
      position: sticky;
      top: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    /* Single Target Element */
    .target-image {
      position: absolute;
      width: 100%;
      max-width: 650px;
      height: 85vh;
      object-fit: contain;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0; /* Fully hidden initially */
      z-index: 20;
    }

    /* Data Nebula Canvas */
    #nebula-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 30; /* Overlaps target image to show particle tearing */
      pointer-events: none;
    }

    /* Main content area: white background */
    main {
      background-color: #ffffff;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="deep-cyan-grid"></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center relative z-10">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 md:w-10 md:h-10 border-2 border-white flex items-center justify-center text-white font-bold text-lg md:text-xl transition-colors duration-300">K</div>
        <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white font-serif transition-colors duration-300 hidden sm:block">Ambrossenkov</h1>
      </div>
      <nav class="hidden md:flex gap-8 items-center text-sm font-medium text-white/90">

        <a href="curiosidades.html" data-i18n="nav-trajectory" class="hover:text-blue-400 transition-colors">Mi trayectoria</a>
        <a href="index.html" class="hover:text-blue-400 transition-colors">Inicio</a>
        <a href="inventos.html" class="hover:text-blue-400 transition-colors">Inventos</a>
      </nav>
      <div class="flex items-center gap-4 md:gap-6">
        <button class="text-white hover:text-blue-400 transition-colors text-sm font-bold uppercase w-8 flex-shrink-0">EN</button>
        <a href="contacto.html" target="_blank" class="hidden md:block px-6 py-2 rounded-full bg-blue-600 text-white font-medium hover:opacity-90 transition-all text-center whitespace-nowrap shadow-[0_0_15px_rgba(37,99,235,0.5)]">
          Contactarme
        </a>
      </div>
    </div>
  </header>

  <!-- ================= FIXED STAR ================= -->
  <svg class="fixed-star" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3b82f6" />
        <stop offset="100%" stop-color="#8b5cf6" />
      </linearGradient>
    </defs>
    <path d="M50 5 L63 38 L98 43 L73 68 L79 100 L50 84 L21 100 L27 68 L2 43 L37 38 Z" fill="url(#starGrad)" />
  </svg>

  <!-- ================= MAIN VOID & SCROLL SPACE ================= -->
  <main class="scroll-track flex-grow">
    <div class="sticky-container">
      <img src="Fotos/foto_portada_de_cartas.png" alt="Stack Cascade" class="target-image" id="target-image">
      <canvas id="nebula-canvas"></canvas>
    </div>
  </main>

  <!-- ================= STANDARD FOOTER ================= -->
  <footer class="relative w-full border-t border-white/20 bg-black z-50">
    <div class="dark-grid"></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col items-center gap-10 relative z-10">
      <div class="w-full text-center md:text-left">
        <h3 class="text-2xl font-bold text-white tracking-widest uppercase">Contactame</h3>

      <div class="flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16 w-full text-white">
        <a href="mailto:k.ambrossenkov@gmail.com" class="flex items-center gap-3 hover:text-blue-400 transition-colors">

        </a>
        <a href="https://www.instagram.com/konsta_ambrossenkov/?__d=1" target="_blank" class="flex items-center gap-3 hover:text-blue-400 transition-colors">

        </a>
        <a href="https://www.linkedin.com/in/konstantino-ambrossenkov/" target="_blank" class="flex items-center gap-3 hover:text-blue-400 transition-colors">

        </a>
      </div>
      <div class="mt-4">
        <img src="Fotos/firma AK.jfif" alt="Firma AK" class="h-16 object-contain border border-transparent hover:border-white/10 transition-colors" onerror="this.outerHTML='<span class=\'text-2xl font-serif italic text-white opacity-70\'>Firma AK</span>'" />
      </div>
      <div class="pt-8 w-full border-t border-white/20 text-center text-gray-500">
        <p class="font-medium text-lg tracking-widest">Estoy para ayudar</p>
      </div>
    </div>
  </footer>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const targetImg = document.getElementById('target-image');
    
    // Core Scrolling Timeline (3 Phases)
    let tl = gsap.timeline({
      scrollTrigger: {
        trigger: ".scroll-track",
        start: "top top",
        end: "bottom bottom",
        scrub: 1.2
      }
    });

    // Phase 1 (0% -> 25%): The void holds, then image materializes from darkness
    tl.to(targetImg, { opacity: 1, duration: 0.25 }, 0);
    
    // Phase 2 (25% -> 50%): Image holds steady, fully visible
    tl.to(targetImg, { scale: 1.05, duration: 0.25 }, 0.25);

    // Phase 3 (50% -> 100%): Image disintegrates while giving birth to Data Nebula
    tl.to(targetImg, { opacity: 0, scale: 0.85, filter: "blur(10px)", duration: 0.5 }, 0.5);

    /* ── DATA NEBULA PARTICLE ENGINE ── */
    const canvas = document.getElementById('nebula-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    const symbols = ['♠', '♥', '♦', '♣', '0', '1', '+', '*'];
    
    class DataParticle {
      constructor() {
        this.reset();
        this.active = false;
      }
      reset() {
        // Explode from the center frame where image rests
        this.x = width / 2 + (Math.random() - 0.5) * 400;
        this.y = height / 2 + (Math.random() - 0.5) * 500; 
        
        // Initial violent vector
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        
        this.life = 1;
        this.decay = Math.random() * 0.02 + 0.008; // Variability in flame death
        
        this.symbol = symbols[Math.floor(Math.random() * symbols.length)];
        this.size = Math.random() * 22 + 10;
        
        const hue = 180 + Math.random() * 100; // Cyan to Purple
        this.color = `hsla(${hue}, 100%, 75%, `;
      }
      
      update(gravX, gravY, intensity) {
        if(!this.active) return;
        
        const dx = gravX - this.x;
        const dy = gravY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        
        // Gravitational pull directly synced to scroll intensity
        this.vx += (dx / dist) * Math.min(intensity, 1) * 2;
        this.vy += (dy / dist) * Math.min(intensity, 1) * 2;
        
        // Quantum noise
        this.vx += (Math.random() - 0.5) * 1.5;
        this.vy += (Math.random() - 0.5) * 1.5;
        
        this.vx *= 0.90; // Cosmic Friction
        this.vy *= 0.90;
        
        this.x += this.vx;
        this.y += this.vy;
        
        this.life -= this.decay * (1 - intensity * 0.4); 
        
        if(this.life <= 0) {
          if (nebulaIntensity > 0.05) {
            this.reset();
            this.active = true;
          } else {
            this.active = false;
          }
        }
      }
      
      draw() {
        if(!this.active) return;
        ctx.fillStyle = this.color + (this.life * Math.min(nebulaIntensity * 2.5, 1)) + ')';
        ctx.font = `${this.size}px monospace`;
        ctx.fillText(this.symbol, this.x, this.y);
      }
    }

    const maxParticles = 500;
    const particles = Array.from({length: maxParticles}, () => new DataParticle());
    
    let nebulaIntensity = 0;
    
    // Sync specifically to the Phase 3 disintegration bounds (50% to 100% of body)
    ScrollTrigger.create({
      trigger: ".scroll-track",
      start: "50% top",
      end: "100% top",
      onUpdate: (self) => {
        nebulaIntensity = self.progress; 
        
        // Spawn/wake up particles correlating with disintegration level
        const countToActivate = Math.floor(nebulaIntensity * maxParticles);
        for(let i = 0; i < countToActivate; i++) {
          if(!particles[i].active) {
            particles[i].reset();
            particles[i].active = true;
          }
        }
      }
    });

    let time = 0;
    function render() {
      // True black clear
      ctx.clearRect(0, 0, width, height);
      
      time += 0.02;
      
      if(nebulaIntensity > 0) {
        // Roaming gravitational center
        const gravX = width/2 + Math.sin(time * 0.7) * (width * 0.35);
        const gravY = height/2 + Math.cos(time * 0.4) * (height * 0.35);
        
        const force = nebulaIntensity * 1.2; 
        
        // Luminous overlapping effects
        ctx.globalCompositeOperation = 'screen';
        
        particles.forEach(p => {
          p.update(gravX, gravY, force);
          p.draw();
        });
        
        ctx.globalCompositeOperation = 'source-over';
      }

      requestAnimationFrame(render);
    }
    
    render();

  </script>
</body>
</html>
