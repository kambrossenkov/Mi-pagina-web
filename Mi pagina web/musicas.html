<!DOCTYPE html>
<html lang="es" class="dark" style="background-color: #000; color-scheme: dark;">
<head>
  <meta charset="UTF-8">

  <title>Músicas | Perspective</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'serif'],

        }
      }

  <style>
    /* Hero scroll container */
    #hero-scroll-root {
      position: relative;
      height: 200vh;
      background: #000;
    }

    /* ── Section 1 — portada con foto ── */
    #hero-s1 {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
      will-change: transform;
    }

    /* Foto de fondo */
    #hero-s1-bg {
      position: absolute;
      inset: 0;
      background-image: url('Fotos/portada_musicas.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: brightness(0.55);
      transform-origin: center center;
      will-change: transform;
    }

    /* Grilla decorativa sobre la foto */
    #hero-s1-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right,  rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 54px 54px;
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 0%, #000 70%, transparent 100%);
      mask-image:         radial-gradient(ellipse 60% 50% at 50% 0%, #000 70%, transparent 100%);
      pointer-events: none;
    }

    /* Texto Section 1 */
    #hero-s1-text {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 2rem;
      color: #fff;
      max-width: 900px;
    }
    #hero-s1-text h1 {
      font-size: clamp(2rem, 5vw, 4.5rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin: 0;
      text-shadow: 0 2px 30px rgba(0,0,0,0.6);
    }
    #hero-s1-text p {
      margin-top: 1.2rem;
      font-size: clamp(0.9rem, 1.8vw, 1.2rem);
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.04em;
    }

    /* Scroll hint arrow */
    #hero-scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.45);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: hero-bounce 1.6s ease infinite;
    }
    #hero-scroll-hint svg {
      width: 20px;
      height: 20px;
      opacity: 0.5;
    }
    @keyframes hero-bounce {
      0%, 100% { transform: translateX(-50%) translateY(0);   opacity: 0.45; }
      50%       { transform: translateX(-50%) translateY(6px); opacity: 0.9;  }
    }

    /* ── Section 2 — contenido (galería) ── */
    #hero-s2 {
      position: relative;
      min-height: 100vh;
      background: linear-gradient(to bottom, #1a1919, #06060e);
      transform-origin: center top;
      will-change: transform;
      overflow: hidden;
    }

    /* Grilla decorativa Section 2 */
    #hero-s2-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right,  rgba(79,79,79,0.18) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(79,79,79,0.18) 1px, transparent 1px);
      background-size: 54px 54px;
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 0%, #000 70%, transparent 100%);
      mask-image:         radial-gradient(ellipse 60% 50% at 50% 0%, #000 70%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Contenido dentro de Section 2 */
    #hero-s2-content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

  <script src="script.js" onerror="console.info('Scripts running')"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
  (function() {
    gsap.registerPlugin(ScrollTrigger);

    const root = document.getElementById('hero-scroll-root');
    const s1   = document.getElementById('hero-s1');
    const s2   = document.getElementById('hero-s2');

    /* Section 1: escala hacia abajo + leve rotación mientras scrolleás */
    gsap.to(s1, {
      scale:  0.8,
      rotate: -5,
      ease:   'none',
      scrollTrigger: {
        trigger: root,
        start:   'top top',
        end:     'bottom bottom',
        scrub:   true,
      }
    });

    /* Section 2: arranca pequeña y rotada, crece al llegar */
    gsap.fromTo(s2,
      { scale: 0.8, rotate: 5  },
      { scale: 1,   rotate: 0,
        ease: 'none',
        scrollTrigger: {
          trigger: root,
          start:   'top top',
          end:     'bottom bottom',
          scrub:   true,
        }
      }
    );

    /* Parallax sutil en la foto de fondo */
    gsap.to('#hero-s1-bg', {
      yPercent: 20,
      ease: 'none',
      scrollTrigger: {
        trigger: s1,
        start:   'top top',
        end:     'bottom top',
        scrub:   true,
      }
    });

  })();
  </script>
</body>
