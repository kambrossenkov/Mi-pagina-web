<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curiosidades | Perspective Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'serif'],
          },
          colors: {
            background: 'var(--background)',
            card: 'var(--card)',
            text: 'var(--text)',
            muted: {
              DEFAULT: 'var(--muted)',
              foreground: 'var(--muted-fg)'
            },
            accent: '#3b82f6',
            primary: {
              DEFAULT: 'var(--primary)',
              foreground: 'var(--primary-fg)'
            },
            border: 'var(--border)',
            input: 'var(--input)',
            ring: 'var(--ring)'
          }
        }
      }
    }
  </script>
</head>

  <header class="sticky top-0 z-50 py-4 md:py-6 border-b border-border/20 bg-background/90 backdrop-blur-sm transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
      <div class="flex items-center gap-3">

      <nav class="hidden md:flex gap-8 items-center text-sm font-medium text-text/90">

      <div class="flex items-center gap-4 md:gap-6">
        <button id="lang-toggle" class="text-text hover:text-accent transition-colors text-sm font-bold uppercase w-8 flex-shrink-0">
          ES
        </button>
        <button id="theme-toggle" class="text-text hover:text-accent transition-colors flex-shrink-0">
          <!-- Sun Icon (shown in dark mode) -->
          <svg id="icon-sun" class="hidden w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>

          <svg id="icon-moon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <a href="contacto.html" target="_blank" data-i18n="nav-contact" class="hidden md:block px-6 py-2 rounded-full bg-primary text-primary-foreground font-medium hover:opacity-90 transition-all text-center whitespace-nowrap">
          Contactarme
        </a>
        <!-- Hamburger Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden text-text hover:text-accent transition-colors focus:outline-none ml-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>

    </div>

      <a href="curiosidades.html" data-i18n="nav-curiosities" class="block text-base font-medium text-text/90 hover:text-accent">Curiosidades</a>
      <a href="index.html" data-i18n="nav-home" class="block text-base font-medium text-text/90 hover:text-accent">Inicio</a>

          <span class="font-medium text-lg">k.ambrossenkov@gmail.com</span>
        </a>
